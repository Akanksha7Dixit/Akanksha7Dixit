name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: Akanksha7Dixit
          outputs: |
            github-contribution-grid-snake.svg

      - name: Push snake to branch
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          branch: output
          create_branch: true
          commit_message: "Generate snake animation"
          file_pattern: github-contribution-grid-snake.svg
