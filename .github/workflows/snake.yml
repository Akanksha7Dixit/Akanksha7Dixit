name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      # ✅ checkout repo
      - uses: actions/checkout@v4

      # ✅ generate snake
      - uses: Platane/snk@v3
        with:
          github_user_name: Akanksha7Dixit
          outputs: |
            dist/github-contribution-grid-snake.svg

      # ✅ deploy to output branch (stable method)
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          publish_branch: output
